name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, pdo_pgsql, zip
          coverage: none

      - name: Bootstrap Laravel skeleton
        # This repo's backend/ ships only the custom app code (app/,
        # routes/, database/, config/cors.php, bootstrap/app.php,
        # resources/views/reports) — same reason backend/Dockerfile has a
        # dedicated skeleton stage. Fill in the rest of a real Laravel 12
        # install (artisan, public/, the rest of config/*, bootstrap/
        # providers.php, etc.) without touching any file we already ship —
        # --ignore-existing skips anything already present in backend/.
        run: |
          composer create-project laravel/laravel:^12.0 /tmp/skeleton --prefer-dist --no-interaction --no-scripts
          rsync -a --ignore-existing /tmp/skeleton/ .

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run backend test suite
        run: php artisan test

  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run frontend test suite
        run: npm run test

      - name: Type check
        run: npx tsc --noEmit

  # Deployment is handled separately by Vercel (frontend, auto-deploys on
  # push once connected) and Koyeb (backend, redeploy manually or via
  # Koyeb's own GitHub integration — see VERCEL.md / KOYEB.md). No deploy
  # job lives in this workflow; it only gates merges on tests passing.
