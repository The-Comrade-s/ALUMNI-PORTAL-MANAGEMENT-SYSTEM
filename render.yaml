services:
  - type: web
    name: gateway-alumni-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_DOMAIN
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gateway-alumni-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gateway-alumni-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gateway-alumni-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gateway-alumni-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gateway-alumni-db
          property: password
      - key: SUPER_ADMIN_SEED_PASSWORD
        sync: false
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT

  - type: worker
    name: gateway-alumni-queue
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    startCommand: php artisan queue:work --tries=3

  - type: web
    name: gateway-alumni-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: gateway-alumni-db
    plan: starter
    databaseName: gateway_alumni
    user: gateway_alumni
